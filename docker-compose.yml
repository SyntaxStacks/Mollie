services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reselleros}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  browser-grid:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    restart: unless-stopped
    init: true
    ipc: host
    working_dir: /home/pwuser
    user: pwuser
    command:
      - /bin/sh
      - -c
      - npx -y playwright@1.58.2 run-server --port 3000 --host 0.0.0.0
    ports:
      - "${BROWSER_GRID_HOST_PORT:-3100}:3000"

volumes:
  postgres_data:
  redis_data:
